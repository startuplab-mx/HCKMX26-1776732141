name: Deploy to GitHub Pages

on:
  push:
    branches: 'integration/v1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/faro/package-lock.json

      - name: Install dependencies
        working-directory: ./front/faro
        run: npm ci

      - name: Build frontend
        working-directory: ./front/faro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './front/faro/dist'

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        working-directory: ./back/HackathonProject/demo
        run: chmod +x mvnw

      - name: Build backend
        working-directory: ./back/HackathonProject/demo
        run: ./mvnw clean package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: ./back/HackathonProject/demo/target/demo-*.jar

  deploy:
    environment:
      name: github-pages-${{ github.ref_name }}
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
