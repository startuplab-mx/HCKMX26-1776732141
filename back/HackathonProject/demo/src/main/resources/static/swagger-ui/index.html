<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Infancias Súper Seguras API</title>
  <link rel="stylesheet" href="/webjars/swagger-ui/swagger-ui.css">
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="/webjars/swagger-ui/swagger-ui-bundle.js"></script>
  <script src="/webjars/swagger-ui/swagger-ui-standalone-preset.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: "/api/openapi.json",
      dom_id: "#swagger-ui",
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset.slice(1)],
      layout: "StandaloneLayout"
    });
  </script>
</body>
</html>
