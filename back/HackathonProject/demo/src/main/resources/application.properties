spring.application.name=infancias-super-seguras

server.port=${PORT:8080}

# H2 in-memory database (volatile, demo only)
spring.datasource.url=jdbc:h2:mem:reportingdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jersey served under /api/* so /h2-console and Spring MVC keep working
spring.jersey.type=servlet
spring.jersey.application-path=/api

# Mail (override via env vars in deployment). Defaults are safe placeholders.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${MAIL_FROM:no-reply@infanciassuperseguras.org}
app.mail.enabled=${MAIL_ENABLED:false}

# FARO fingerprint module (Python-backed perceptual hashing for evidence files)
faro.fingerprint.python=${FARO_PYTHON:scripts/.venv/bin/python}
faro.fingerprint.script=${FARO_SCRIPT:scripts/faro_fingerprint.py}
faro.fingerprint.timeoutSeconds=${FARO_TIMEOUT:120}
